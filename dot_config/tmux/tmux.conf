#set -g status-bg red

set-option -g prefix C-b

# Make mouse useful in copy mode
set -g mouse on

# Allow xterm titles in terminal window, terminal scrolling with scrollbar, and setting overrides of C-Up, C-Down, C-Left, C-Right
# (commented out because it disables cursor navigation in vim)
#set -g terminal-overrides "xterm*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"

# Scroll History
set -g history-limit 30000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing for quicker response (and snappier nvim).
set -s escape-time 10

#-------------------------------------------------------#
# Modern settings (2026)
#-------------------------------------------------------#
# True color — without RGB passthrough, Ghostty theme colours get quantized.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
# Let graphics/image protocols pass through tmux (needed for yazi image previews).
set -g allow-passthrough on
# OSC-52 system clipboard (Ghostty supports it; works over SSH too).
set -g set-clipboard on
# nvim autoread + clean pane-nav handoff with vim-tmux-navigator.
set -g focus-events on
# Windows start at 1 and renumber when one closes.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# So that TPM works with brew tmux which is not in /usr/bin
#set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"
#set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M:%S'
set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M '


bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"
bind-key M split-window -h "vim ~/.config/tmux/tmux.conf"

bind V split-window -h
bind H split-window
# set -g default-terminal "xterm-256color"
# set -g mouse on
# setw -g utf8 on
setw -g mode-keys vi
#set-option -g default-shell /bin/zsh

#-------------------------------------------------------#
#Pane colours
#-------------------------------------------------------#
# set inactive/active window styles
# Use `default` for bg so tmux doesn't paint over the terminal (Ghostty theme)
# background — otherwise these hardcoded colours hide the Ghostty theme colour.
set -g window-style 'default'
set -g window-active-style 'default'
#pane border
# set -g pane-border-bg colour235
# set -g pane-border-fg colour238
# set -g pane-active-border-bg colour236
# set -g pane-active-border-fg colour51
#-------------------------------------------------------#
#-------------------------------------------------------#
#Pane copy/pasting
#-------------------------------------------------------#
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind C-v paste-buffer
#-------------------------------------------------------#

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save/restore (pairs with resurrect)
set -g @plugin 'tmux-plugins/tmux-yank'        # robust copy to system clipboard (pbcopy)
set -g @plugin 'christoomey/vim-tmux-navigator' # seamless C-h/j/k/l between nvim & tmux
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'wfxr/tmux-power'
#set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'thewtex/tmux-mem-cpu-load'


set -g @tmux_power_theme 'snow'

# tmux-continuum: auto-save every 15 min and restore the last env on tmux start.
set -g @continuum-restore 'on'

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

if "test ! -d ~/.tmux/plugins/tpm" \
       "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run -b '~/.tmux/plugins/tpm/tpm'

#set -g default-command /usr/bin/zsh
#run-shell /Users/pat/.tmux/plugins/tmux-cpu/cpu.tmux
